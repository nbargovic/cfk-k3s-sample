apiVersion: platform.confluent.io/v1beta1
kind: SchemaRegistry
metadata:
  name: schemaregistry
  namespace: confluent
spec:
  replicas: 1
  image:
    application: confluentinc/cp-schema-registry:7.3.1-1-ubi8
    init: confluentinc/confluent-init-container:2.5.1
  tls:
    secretRef: tls-schemaregistry
  externalAccess:
    type: route
    route:
      domain: apps.nbargovic-fips.pks4.p1.openshiftapps.com
  dependencies:
    kafka:
      bootstrapEndpoint: kafka.confluent.svc.cluster.local:9071
      authentication:
        type: mtls
      tls:
        enabled: true
  podTemplate:
    podSecurityContext: {}
  license:
    globalLicense: true
---
apiVersion: platform.confluent.io/v1beta1
kind: Connect
metadata:
  name: connect
  namespace: confluent
spec:
  replicas: 1
  image:
    application: confluentinc/cp-server-connect:7.3.1-1-ubi8
    init: confluentinc/confluent-init-container:2.5.1
  tls:
    secretRef: tls-connect
  externalAccess:
    type: route
    route:
      domain: apps.nbargovic-fips.pks4.p1.openshiftapps.com
  dependencies:
    kafka:
      bootstrapEndpoint: kafka.confluent.svc.cluster.local:9071
      authentication:
        type: mtls
      tls:
        enabled: true
    schemaRegistry:
      url: https://schemaregistry.confluent.svc.cluster.local:8081
  podTemplate:
    podSecurityContext: { }
  license:
    globalLicense: true